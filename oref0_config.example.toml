# oref0 Profile Configuration for py-mgipsim
#
# Usage:
#   python run_oref0_sim.py --oref0-config oref0_config.example.toml [other flags...]
#
# Any oref0 profile field not overriden here keeps its default or patient-derived value.
#
# Precedence (lowest to highest):
#   1. Hardcoded defaults (profile_builder.py)
#   2. Patient-derived values (basal, ISF, CR from demographic_info)
#   3. [global] section below
#   4. [patient.N] section below (0-based patient index)

[global]


target_bg = 110
min_bg = 100
max_bg = 120

# Duration of insulin action in hours. Minimum 3. Default: 5
dia = 5
# Insulin curve model: "rapid-acting", "ultra-rapid", or "bilinear"
# Default: "rapid-acting"
curve = "rapid-acting"

# Custom peak time (minutes). Only used when useCustomPeakTime = true.
# useCustomPeakTime = true
# insulinPeakTime = 55


# Maximum temp basal rate (U/hr). Default: current_basal * 4
# max_basal = 3.0
# Maximum insulin on board (U). Default: total_daily_basal * 0.3
# max_iob = 5.0
# Safety multipliers that cap max temp basal rate.
# max_daily_safety_multiplier = 3
# current_basal_safety_multiplier = 4

# ISF in mg/dL per unit. Overrides patient-derived value.
# sens = 42

# autosens_max = 1.2
# autosens_min = 0.7

# Whether detected sensitivity/resistance adjusts the target BG.
# sensitivity_raises_target = true
# resistance_lowers_target = false


# carb_ratio = 15


# Minimum carb absorption rate (mg/dL per 5 min). Default: 8
# min_5m_carbimpact = 8

# Maximum COB. Default: 120
# maxCOB = 120

# remainingCarbsFraction = 1
# remainingCarbsCap = 90
# carbsReqThreshold = 1

# These only take effect when SMB is enabled (--enable-smb flag).
# enableSMB_always = true
# enableSMB_with_COB = false
# enableSMB_after_carbs = false
# enableSMB_with_temptarget = false
# allowSMB_with_high_temptarget = false

# Max minutes of basal for a single SMB (with COB). Default: 30
# maxSMBBasalMinutes = 30

# Max minutes of basal for a single SMB (UAM / IOB > COB). Default: 30
# maxUAMSMBBasalMinutes = 30

# Minimum interval between SMBs (minutes). Default: 3
# SMBInterval = 3

# Smallest bolus the pump can deliver (U). Default: 0.1
# bolus_increment = 0.1

# exercise_mode = false
# half_basal_exercise_target = 160


# high_temptarget_raises_sensitivity = false
# low_temptarget_lowers_sensitivity = false


# noisyCGMTargetMultiplier = 1.3
# maxDelta_bg_threshold = 0.2


# skip_neutral_temps = false
# suspend_zeros_iob = true
# bolussnooze_dia_divisor = 2


# Per-Patient Overrides
# Use 0-based patient index. Only listed fields differ from [global].
# Sections for indices beyond the cohort size are silently ignored.

# [patient.0]
# target_bg = 100
# max_iob = 4.0

# [patient.1]
# target_bg = 90
# dia = 6
# curve = "ultra-rapid"
